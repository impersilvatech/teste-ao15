<!DOCTYPE html>
<html lang="pt-AO" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#0d0d1a"/>
<title>A Minha Conta</title>
<script>
(function(){
  var t=localStorage.getItem('tema')||'dark';
  var l=localStorage.getItem('idioma')||'pt';
  document.documentElement.setAttribute('data-theme',t);
  document.documentElement.setAttribute('lang',l==='en'?'en':'pt-AO');
  if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(function(){});
})();
</script>
<script src="config.js"></script>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="favicon.svg" type="image/svg+xml"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d0d1a;--bg2:#14142b;--card:#1a1a32;--border:#2a2a4a;--pink:#ff6b9d;--purple:#b14ae8;--teal:#06d6a0;--yellow:#ffd166;--red:#ff4757;--white:#f0f0ff;--muted:#9898bb;--ft:'Fredoka One',cursive;--fb:'Nunito',sans-serif;--grad:linear-gradient(135deg,#ff6b9d,#b14ae8)}
[data-theme="light"]{--bg:#fff5f8;--bg2:#fff;--card:#fff;--border:#f0d6e8;--white:#1a0a2e;--muted:#7a5a8a;--pink:#d4437d;--purple:#7a2fb0;--teal:#048a65;--red:#d63547;--yellow:#a07800}
.offline-bar{position:fixed;top:0;left:0;right:0;z-index:9999;background:#ff4757;color:#fff;text-align:center;font-family:var(--ft);font-size:.75rem;padding:7px 12px;transform:translateY(-100%);transition:transform .3s ease}
.offline-bar.show{transform:translateY(0)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--bg);color:var(--white);min-height:100vh;padding-bottom:80px;transition:background .35s}
.hdr{position:sticky;top:0;z-index:100;background:rgba(13,13,26,.97);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px}
[data-theme="light"] .hdr{background:rgba(255,245,248,.97)}
.btn-bk{width:34px;height:34px;border-radius:50%;background:none;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.88rem;cursor:pointer;color:var(--white)}
.hdr-nome{font-family:var(--ft);font-size:1.1rem;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex:1;text-align:center}
.hb{width:34px;height:34px;border-radius:50%;background:none;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.88rem;cursor:pointer;color:var(--white);text-decoration:none}
.ctn{padding:14px;max-width:520px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px}
.card.hidden{display:none}
.fg{margin-bottom:11px}
.fg label{display:block;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}
.fg label .opc{font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)}
.fi{width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;font-family:var(--fb);font-size:.88rem;color:var(--white);outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--pink)}.fi::placeholder{color:var(--muted)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-sub{width:100%;padding:14px;background:var(--grad);border:none;border-radius:50px;font-family:var(--ft);font-size:.95rem;color:#fff;cursor:pointer;box-shadow:0 4px 16px rgba(255,107,157,.3);display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.btn-sub:disabled{opacity:.5;cursor:not-allowed}
.btn-sub:active{transform:scale(.97)}
.btn-outline{width:100%;padding:12px;background:none;border:1.5px solid var(--border);border-radius:50px;font-family:var(--ft);font-size:.82rem;color:var(--muted);cursor:pointer;transition:all .2s;text-align:center;text-decoration:none;display:block}
.btn-outline:hover{border-color:var(--pink);color:var(--pink)}
.msg{font-size:.78rem;text-align:center;margin-top:10px;min-height:18px}
.msg.err{color:var(--red)}.msg.ok{color:var(--teal)}

/* Tabs */
.tabs{display:flex;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
.tab{flex:1;padding:11px;background:none;border:none;font-family:var(--ft);font-size:.78rem;color:var(--muted);cursor:pointer;transition:all .2s}
.tab.on{background:var(--grad);color:#fff}

/* Perfil */
.perfil-card{background:var(--grad);border-radius:20px;padding:0;margin-bottom:14px;position:relative;overflow:hidden}
.perfil-top{position:relative;padding:35px 20px 28px;text-align:center;overflow:hidden}
.perfil-top::before{content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.08)}
.perfil-top::after{content:'';position:absolute;bottom:-30px;left:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06)}
.perfil-avatar{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:2rem;color:#fff;border:3px solid rgba(255,255,255,.3);position:relative;z-index:1;cursor:pointer;transition:all .2s}
.perfil-avatar:hover{transform:scale(1.05);border-color:#fff}
.perfil-avatar i{font-size:2rem}
.perfil-nome{font-family:var(--ft);font-size:1.4rem;color:#fff;margin-bottom:2px;position:relative;z-index:1}
.perfil-email{font-size:.78rem;color:rgba(255,255,255,.7);position:relative;z-index:1}
.perfil-stats{display:flex;border-top:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.1)}
.perfil-stat{flex:1;text-align:center;padding:14px 6px;color:#fff;text-decoration:none;transition:all .2s;cursor:pointer}
.perfil-stat:hover{background:rgba(255,255,255,.08)}
.perfil-stat-num{font-family:var(--ft);font-size:1.3rem;display:block}
.perfil-stat-lbl{font-size:.55rem;opacity:.7;text-transform:uppercase;letter-spacing:.5px}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.perfil-anim{animation:fadeInUp .5s ease both}

/* Encomendas */
.enc-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.enc-card:hover{border-color:rgba(255,107,157,.3);transform:translateY(-1px)}
.enc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.enc-ref{font-family:var(--ft);font-size:.85rem;color:var(--white)}
.enc-data{font-size:.64rem;color:var(--muted)}
.enc-body{display:flex;justify-content:space-between;align-items:center}
.enc-items{font-size:.72rem;color:var(--muted)}
.enc-total{font-family:var(--ft);font-size:.9rem;color:var(--pink)}
.enc-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:50px;font-family:var(--ft);font-size:.56rem;text-transform:uppercase}
.enc-badge.pendente{background:rgba(255,209,102,.1);color:var(--yellow);border:1px solid rgba(255,209,102,.3)}
.enc-badge.confirmada{background:rgba(6,214,160,.1);color:var(--teal);border:1px solid rgba(6,214,160,.3)}
.enc-badge.pronta{background:rgba(177,74,232,.1);color:var(--purple);border:1px solid rgba(177,74,232,.3)}
.enc-badge.entregue{background:rgba(6,214,160,.08);color:var(--teal);border:1px solid rgba(6,214,160,.2)}
.enc-badge.cancelada{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.2)}
.enc-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.enc-btn{padding:5px 12px;border-radius:50px;border:1px solid var(--border);background:none;font-family:var(--ft);font-size:.6rem;color:var(--muted);cursor:pointer;text-decoration:none;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
.enc-btn:hover{border-color:var(--pink);color:var(--pink)}
.enc-btn.primary{background:var(--grad);color:#fff;border:none}
.enc-vazia{text-align:center;padding:40px 20px}
.enc-vazia i{font-size:2.5rem;opacity:.15;display:block;margin-bottom:12px;color:var(--pink)}
.enc-vazia p{font-size:.82rem;color:var(--muted)}

/* Avatar picker */
.avatar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}
.avatar-opt{aspect-ratio:1;border-radius:var(--r);background:var(--bg2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.5rem;cursor:pointer;transition:all .15s;color:var(--muted)}
.avatar-opt:hover{border-color:var(--pink);color:var(--pink)}
.avatar-opt.sel{border-color:var(--pink);background:rgba(255,107,157,.1);color:var(--pink);box-shadow:0 0 0 3px rgba(255,107,157,.15)}

/* Tema toggle */
.tema-toggle{display:flex;align-items:center;gap:10px;padding:12px 0;cursor:pointer}
.tema-toggle i{font-size:1.2rem;color:var(--yellow)}

/* Logout */
.btn-sair{width:100%;padding:13px;background:none;border:1.5px solid rgba(255,71,87,.2);border-radius:50px;font-family:var(--ft);font-size:.88rem;color:var(--red);cursor:pointer;transition:all .2s;margin-top:6px}
.btn-sair:hover{background:rgba(255,71,87,.08);border-color:var(--red)}

.nav{position:fixed;bottom:0;left:0;right:0;z-index:200;padding:6px 10px 8px;display:flex;gap:8px;align-items:center;background:rgba(13,13,26,.97);border-top:1px solid var(--border)}
[data-theme="light"] .nav{background:rgba(255,245,248,.97)}
.btn-home-nav{width:38px;height:38px;background:var(--bg2);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--white);text-decoration:none;font-size:.9rem;flex-shrink:0}
.btn-cat-nav{flex:1;height:38px;border:none;background:var(--grad);border-radius:50px;font-family:var(--ft);font-size:.78rem;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;text-decoration:none;box-shadow:0 4px 14px rgba(255,107,157,.3)}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--card);border:1px solid var(--pink);border-radius:14px;padding:10px 18px;font-size:.82rem;font-weight:700;color:var(--pink);z-index:9999;opacity:0;pointer-events:none;transition:transform .4s ease;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}.toast.err{border-color:var(--red);color:var(--red)}
.spin{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--pink);border-radius:50%;animation:spin-anim .8s linear infinite;margin:28px auto}
@keyframes spin-anim{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="offline-bar" id="offlineBar">📡 Sem ligação à internet — a tentar reconectar…</div>

<header class="hdr">
  <button class="btn-bk" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
  <div class="hdr-nome" id="hdrNome">A Minha Conta</div>
  <div style="width:34px"></div>
</header>

<div class="ctn">
  <!-- BOTÃO PARA O PAINEL ADMIN (visível apenas na área de login) -->
  <div id="authBox">
    <div class="card" style="margin-bottom:12px; background:rgba(177,74,232,0.05); border:1px solid rgba(177,74,232,0.2); cursor:pointer;" 
         onclick="window.open('https://impersilvatech.github.io/IMPERSILVA/verificar-site.html', '_blank')">
      <div style="display:flex; align-items:center; gap:12px; padding:12px 16px; text-decoration:none; color:var(--white);">
        <span style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#b14ae8,#ff6b9d);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0">
          <i class="fa-solid fa-shield-halved"></i>
        </span>
        <span style="flex:1;font-family:var(--ft);font-size:.85rem;">Aceder ao Painel Admin</span>
        <i class="fa-solid fa-arrow-up-right-from-square" style="color:var(--muted);font-size:.7rem"></i>
      </div>
    </div>

    <div class="tabs">
      <button class="tab on" id="tabL" onclick="mudarTab('login')" id="tabLogin">Entrar</button>
      <button class="tab" id="tabR" onclick="mudarTab('registar')" id="tabReg">Criar Conta</button>
    </div>
    <div class="card" id="fLogin">
      <div class="fg"><label id="lContactLbl">Email ou Telefone</label><input class="fi" type="text" id="lContact" placeholder="email@... ou +244..."></div>
      <div class="fg"><label id="lPassLbl">Password</label><input class="fi" type="password" id="lPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"></div>
      <button class="btn-sub" onclick="login()"><i class="fa-solid fa-arrow-right-to-bracket"></i> <span id="loginBtn">Entrar</span></button>
      <p class="msg" id="lMsg"></p>
    </div>
    <div class="card hidden" id="fReg">
      <div class="fg"><label id="rNomeLbl">Nome completo *</label><input class="fi" type="text" id="rNome" placeholder="O seu nome"></div>
      <div class="fg"><label id="rEmailLbl">Email <span class="opc">(opcional)</span></label><input class="fi" type="email" id="rEmail" placeholder="email@..."></div>
      <div class="fg"><label id="rTelLbl">Telefone (+244) *</label><input class="fi" type="tel" id="rTel" placeholder="+244 9XX XXX XXX" oninput="formatarTel(this)"></div>
      <div class="fg"><label id="rPassLbl">Password *</label><input class="fi" type="password" id="rPass" placeholder="Mínimo 6 caracteres"></div>
      <button class="btn-sub" onclick="registar()"><i class="fa-solid fa-user-plus"></i> <span id="registerBtn">Criar Conta</span></button>
      <p class="msg" id="rMsg"></p>
    </div>
  </div>

  <!-- LOGADO -->
  <div id="perfilBox" style="display:none">
    <div class="perfil-card perfil-anim" id="perfilCard"></div>

    <!-- Menu rápido -->
    <div class="card" style="padding:8px">
      <a href="rastrear.html" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;text-decoration:none;color:var(--white);transition:all .2s" onmouseover="this.style.background='rgba(255,107,157,.05)'" onmouseout="this.style.background='none'">
        <span style="width:34px;height:34px;border-radius:10px;background:rgba(255,107,157,.1);display:flex;align-items:center;justify-content:center;color:var(--pink)"><i class="fa-solid fa-magnifying-glass"></i></span>
        <span style="flex:1;font-family:var(--ft);font-size:.82rem" id="menuTrack">Rastrear Encomenda</span>
        <i class="fa-solid fa-chevron-right" style="color:var(--muted);font-size:.7rem"></i>
      </a>
      <a href="catalogo.html" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;text-decoration:none;color:var(--white);transition:all .2s" onmouseover="this.style.background='rgba(255,107,157,.05)'" onmouseout="this.style.background='none'">
        <span style="width:34px;height:34px;border-radius:10px;background:rgba(255,107,157,.1);display:flex;align-items:center;justify-content:center;color:var(--pink)"><i class="fa-solid fa-store"></i></span>
        <span style="flex:1;font-family:var(--ft);font-size:.82rem" id="menuCatalog">Ver Catálogo</span>
        <i class="fa-solid fa-chevron-right" style="color:var(--muted);font-size:.7rem"></i>
      </a>
    </div>

    <div style="font-family:var(--ft);font-size:.95rem;color:var(--pink);margin-bottom:10px;display:flex;align-items:center;gap:6px;padding:0 4px"><i class="fa-solid fa-clock-rotate-left"></i> <span id="myOrdersTxt">As Minhas Encomendas</span></div>
    <div id="encLista"><div class="spin"></div></div>

    <!-- Editar Perfil -->
    <div class="card" id="editPerfilCard" style="display:none">
      <div style="font-family:var(--ft);font-size:.9rem;color:var(--pink);margin-bottom:12px"><i class="fa-solid fa-user-pen"></i> <span id="editProfileTitle">Editar Perfil</span></div>
      <div style="margin-bottom:12px">
        <label style="font-size:.58rem;font-weight:700;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px" id="avatarLbl">Avatar</label>
        <div class="avatar-grid" id="avatarGrid"></div>
      </div>
      <div class="fg"><label id="editNomeLbl">Nome</label><input class="fi" type="text" id="editNome" placeholder="O seu nome"></div>
      <div class="fg"><label id="editEmailLbl">Email</label><input class="fi" type="email" id="editEmail" placeholder="email@..."></div>
      <div class="fg"><label id="editTelLbl">Telefone</label><input class="fi" type="tel" id="editTel" placeholder="+244 9XX XXX XXX" oninput="formatarTel(this)"></div>
      <div style="display:flex;gap:8px">
        <button class="btn-outline" onclick="cancelarEdicao()" style="flex:1"><i class="fa-solid fa-xmark"></i> <span id="cancelBtn">Cancelar</span></button>
        <button class="btn-sub" onclick="salvarPerfil()" style="flex:1;padding:12px;font-size:.82rem"><i class="fa-solid fa-floppy-disk"></i> <span id="saveBtn">Guardar</span></button>
      </div>
      <p class="msg" id="editMsg"></p>
    </div>

    <!-- Referidos -->
    <div class="card" id="referidosCard" style="display:none;padding:16px;background:linear-gradient(135deg,rgba(255,107,157,.07),rgba(177,74,232,.07));border:1px solid rgba(255,107,157,.2);border-radius:16px;margin-bottom:8px">
      <div style="font-family:var(--ft);font-size:.9rem;color:var(--pink);margin-bottom:8px;display:flex;align-items:center;gap:7px"><i class="fa-solid fa-users-between-lines"></i> <span id="refTitle">Programa de Referidos</span></div>
      <p id="refDesc" style="font-size:.75rem;color:var(--muted);margin-bottom:12px;line-height:1.5">Partilha o teu link e tu e o teu amigo recebem desconto.</p>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;gap:8px">
        <div id="refLink" style="flex:1;font-size:.7rem;color:var(--muted);word-break:break-all;font-family:monospace"></div>
        <button onclick="copiarRefLink()" style="flex-shrink:0;padding:6px 12px;background:var(--grad);border:none;border-radius:50px;font-family:var(--ft);font-size:.68rem;color:#fff;cursor:pointer"><i class="fa-solid fa-copy"></i> <span id="copyRefBtn">Copiar</span></button>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="partilharRef()" style="flex:1;padding:10px;background:linear-gradient(135deg,#128c7e,#25d366);border:none;border-radius:50px;font-family:var(--ft);font-size:.75rem;color:#fff;cursor:pointer"><i class="fa-brands fa-whatsapp"></i> <span id="shareWhatsapp">Partilhar no WhatsApp</span></button>
      </div>
      <div id="refStats" style="margin-top:10px;font-size:.7rem;color:var(--muted);text-align:center"></div>
    </div>

    <button class="btn-outline" onclick="abrirEdicao()"><i class="fa-solid fa-user-pen"></i> <span id="editProfileBtn">Editar Perfil</span></button>
    <button class="btn-sair" onclick="logout()"><i class="fa-solid fa-right-from-bracket" style="margin-right:6px"></i> <span id="logoutBtn">Terminar Sessão</span></button>
  </div>
</div>

<div class="nav">
  <a href="index.html" class="btn-home-nav"><i class="fa-solid fa-house"></i></a>
  <a href="catalogo.html" class="btn-cat-nav"><i class="fa-solid fa-store"></i> <span id="btnCatTxt">Ver Catálogo</span></a>
</div>
<div class="toast" id="toast"></div>

function formatarTel(inp){var v=inp.value.replace(/[^0-9+]/g,'');if(v.startsWith('+244')){var r=v.slice(4);if(r.length>9)r=r.slice(0,9);inp.value='+244 '+r;}else if(v.startsWith('9')){var r=v.replace(/[^0-9]/g,'');if(r.length>9)r=r.slice(0,9);inp.value='+244 '+r;}else if(v.length>0){inp.value='+244 ';}}

async function login(){
  var c=document.getElementById('lContact').value.trim(),p=document.getElementById('lPass').value;
  var msg=document.getElementById('lMsg');
  if(!c||!p){msg.textContent=t('errFill');msg.className='msg err';return;}
  try{
    var body={password:p};if(c.includes('@'))body.email=c;else body.telefone=c;
    var r=await fetch(API+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    var d=await r.json();if(d.erro)throw new Error(d.erro);
    if(!localStorage.getItem('cf_avatar'))localStorage.setItem('cf_avatar',avatares[Math.floor(Math.random()*avatares.length)]);
    localStorage.setItem('cf_token',d.token);localStorage.setItem('cf_cliente',JSON.stringify({nome:d.nome,email:d.email}));
    localStorage.setItem('cf_cliente_tel',d.telefone||c);
    toast(t('welcome')+d.nome.split(' ')[0]+'!');
    var redir=getParam('redir');if(redir){window.location.href=redir;return;}
    mostrarPerfil({nome:d.nome,email:d.email,telefone:d.telefone||c});
  }catch(e){msg.textContent=e.message;msg.className='msg err';}
}

async function registar(){
  var nome=document.getElementById('rNome').value.trim(),email=document.getElementById('rEmail').value.trim();
  var tel=document.getElementById('rTel').value.trim(),pass=document.getElementById('rPass').value;
  var msg=document.getElementById('rMsg');
  if(!nome||!pass){msg.textContent=t('errFill');msg.className='msg err';return;}
  if(!validarTel(tel)){msg.textContent=t('errTel');msg.className='msg err';return;}
  if(email&&!validarEmail(email)){msg.textContent=t('errEmail');msg.className='msg err';return;}
  if(pass.length<6){msg.textContent=t('errPass');msg.className='msg err';return;}
  try{
    localStorage.setItem('cf_avatar',avatares[Math.floor(Math.random()*avatares.length)]);
    var r=await fetch(API+'/api/auth/registar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome:nome,email:email||'',telefone:tel,senha:pass})});
    var d=await r.json();if(d.erro)throw new Error(d.erro);
    localStorage.setItem('cf_token',d.token);localStorage.setItem('cf_cliente',JSON.stringify({nome:d.nome,email:d.email}));
    localStorage.setItem('cf_cliente_tel',tel);
    toast(t('accountCreated'));
    var redir=getParam('redir');if(redir){window.location.href=redir;return;}
    mostrarPerfil({nome:d.nome,email:d.email,telefone:tel});
  }catch(e){msg.textContent=e.message;msg.className='msg err';}
}

function mostrarPerfil(cli){
  document.getElementById('authBox').style.display='none';
  document.getElementById('perfilBox').style.display='block';
  atualizarPerfilCard(cli);
  carregarEncs();
  setInterval(carregarEncs,30000);

}

function atualizarPerfilCard(cli){
  var avatar=getAvatar();
  document.getElementById('perfilCard').innerHTML=
    '<div class="perfil-top">'+
      '<div class="perfil-avatar"><i class="'+avatar+'"></i></div>'+
      '<div class="perfil-nome">'+(cli.nome||'Cliente')+'</div>'+
      '<div class="perfil-email">'+(cli.email||'')+'</div>'+

      '<div class="perfil-stat"><span class="perfil-stat-num" id="statEnc">—</span><span class="perfil-stat-lbl">'+t('orders')+'</span></div>'+
      '<a href="carrinho.html" class="perfil-stat"><span class="perfil-stat-num" id="statCart">—</span><span class="perfil-stat-lbl">'+t('cart')+'</span></a>'+

function abrirEdicao(){
  var cli=getCliente();
  document.getElementById('editPerfilCard').style.display='block';
  var avatarAtual=getAvatar();
  document.getElementById('avatarGrid').innerHTML=avatares.map(function(a){
    return'<div class="avatar-opt'+(a===avatarAtual?' sel':'')+'" onclick="selecionarAvatar(\''+a+'\',this)"><i class="'+a+'"></i></div>';
  }).join('');
  document.getElementById('editNome').value=cli?cli.nome:'';
  document.getElementById('editEmail').value=cli?cli.email:'';

}

function selecionarAvatar(avatar,el){
  document.querySelectorAll('.avatar-opt').forEach(function(x){x.classList.remove('sel');});
  el.classList.add('sel');el.dataset.avatar=avatar;
}

function cancelarEdicao(){document.getElementById('editPerfilCard').style.display='none';}

function salvarPerfil(){
  var nome=document.getElementById('editNome').value.trim();
  var email=document.getElementById('editEmail').value.trim();
  var tel=document.getElementById('editTel').value.trim();
  var msg=document.getElementById('editMsg');
  if(!nome){msg.textContent=t('errFill');msg.className='msg err';return;}
  if(email&&!validarEmail(email)){msg.textContent=t('errEmail');msg.className='msg err';return;}
  if(tel&&!validarTel(tel)){msg.textContent=t('errTel');msg.className='msg err';return;}
  var avatarSel=document.querySelector('.avatar-opt.sel');
  if(avatarSel&&avatarSel.dataset.avatar)localStorage.setItem('cf_avatar',avatarSel.dataset.avatar);
  var cli=getCliente()||{};cli.nome=nome;cli.email=email;
  localStorage.setItem('cf_cliente',JSON.stringify(cli));
  localStorage.setItem('cf_cliente_tel',tel);
  document.getElementById('editPerfilCard').style.display='none';
  atualizarPerfilCard({nome:nome,email:email});
  toast(t('profileSaved'));
}

async function carregarEncs(){
  var cont=document.getElementById('encLista');
  if(!cont)return;
  try{
    var token=localStorage.getItem('cf_token');
    if(!token){cont.innerHTML='<div class="enc-vazia"><i class="fa-solid fa-box-open"></i><p>'+t('noOrders')+'</p></div>';document.getElementById('statEnc').textContent='0';return;}
    var r=await fetch(API+'/api/admin/encomendas',{headers:{'Authorization':'Bearer '+token}});
    var encs=await r.json();
    if(!Array.isArray(encs)||!encs.length){cont.innerHTML='<div class="enc-vazia"><i class="fa-solid fa-box-open"></i><p>'+t('noOrders')+'</p></div>';document.getElementById('statEnc').textContent='0';return;}
    encs.sort(function(a,b){return new Date(b.criado_em)-new Date(a.criado_em);});
    document.getElementById('statEnc').textContent=encs.length;
    var statusLabels=t('statusLabels');
    cont.innerHTML=encs.map(function(e){
      var itensNomes=(e.itens||[]).slice(0,3).map(function(i){return i.nome_produto;}).join(', ');
      if((e.itens||[]).length>3)itensNomes+=' +'+(e.itens.length-3)+' '+(idioma==='en'?'items':'itens');
      return'<div class="enc-card" onclick="window.location.href=\'rastrear.html?ref='+e.ref+'\'">'+
        '<div class="enc-header"><span class="enc-ref">'+e.ref+'</span><span class="enc-data">'+fmtData(e.criado_em)+'</span></div>'+
        '<div class="enc-body"><span class="enc-items">'+itensNomes+'</span><span class="enc-total">'+kz(e.total)+'</span></div>'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">'+
          '<span class="enc-badge '+e.estado+'">'+(statusLabels[e.estado]||e.estado)+'</span>'+
        '</div>'+
        '<div class="enc-actions">'+
          '<a href="rastrear.html?ref='+e.ref+'" class="enc-btn"><i class="fa-solid fa-eye"></i> '+t('seeOrder')+'</a>'+
          '<button class="enc-btn primary" onclick="event.stopPropagation();reencomendar(\''+e.ref+'\')"><i class="fa-solid fa-rotate-left"></i> '+t('reorder')+'</button>'+
        '</div>'+
      '</div>';
    }).join('');
  }catch(e){cont.innerHTML='<div class="enc-vazia"><i class="fa-solid fa-triangle-exclamation"></i><p>'+t('loadErr')+'</p></div>';}
}

async function reencomendar(ref){
  try{
    var r=await fetch(API+'/api/encomendas/'+ref);
    var enc=await r.json();
    if(!enc.itens||!enc.itens.length){toast(t('noItems'),'err');return;}
    var cart=enc.itens.map(function(item){return{chave:''+item.produto_id+'-'+Date.now()+Math.random(),produto_id:item.produto_id,nome:item.nome_produto||'Produto',preco:item.preco_unit||0,quantidade:item.quantidade||1,imagem:'',nota:''};});
    localStorage.setItem('cf_carrinho',JSON.stringify(cart));
    toast(t('reordered'));
    setTimeout(function(){window.location.href='carrinho.html';},800);
  }catch(e){toast(t('reorderErr'),'err');}
}

(function(){
  var params=new URLSearchParams(window.location.search);

  if(ref){localStorage.setItem('cf_ref_code',ref);window.history.replaceState({},document.title,window.location.pathname);}

function gerarRefCode(){
  var tel=localStorage.getItem('cf_cliente_tel')||'';
  var base=tel.replace(/\D/g,'').slice(-6);
  return base?'REF-'+base:null;
}

async function mostrarReferidos(){
  var card=document.getElementById('referidosCard');
  if(!card)return;
  try{
    var r=await fetch(API+'/api/loja');var lojaData=await r.json();
    if(!lojaData.referidos_ativo){card.style.display='none';return;}
    card.style.display='block';
    var descontoNovo=lojaData.referidos_desconto_novo||500;
    var descontoRef=lojaData.referidos_desconto_ref||300;
    document.getElementById('refTitle').textContent=t('refTitle');
    document.getElementById('refDesc').textContent=(lojaData.referidos_msg||t('refDesc'))+' (+Kz '+descontoNovo+' novo cliente, +Kz '+descontoRef+' para ti)';
    document.getElementById('copyRefBtn').textContent=t('copyRefBtn');
    document.getElementById('shareWhatsapp').textContent=t('shareWhatsapp');
    var code=gerarRefCode();
    if(!code){card.style.display='none';return;}
    var baseUrl=window.location.href.replace('conta.html','');
    var link=baseUrl+'index.html?ref='+code;
    document.getElementById('refLink').textContent=link;
    var uses=localStorage.getItem('cf_ref_uses')||'0';
    document.getElementById('refStats').textContent=idioma==='en'?uses+' friends referred':uses+' amigos referidos';
  }catch(e){card.style.display='none';}
}

function copiarRefLink(){
  var link=document.getElementById('refLink').textContent;
  navigator.clipboard.writeText(link).then(function(){
    var btn=document.getElementById('copyRefBtn');
    btn.textContent=t('copied');
    setTimeout(function(){btn.textContent=t('copyRefBtn');},2500);
  });
}

function partilharRef(){
  var link=document.getElementById('refLink').textContent;
  var msg=t('refDesc')+'\n\n'+link;
  if(navigator.share){navigator.share({title:'Desconto especial!',text:msg,url:link});}
  else{window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');}
}
